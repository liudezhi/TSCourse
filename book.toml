[book]
title = "30 天 TypeScript 精品课程"
authors = ["Codex"]
description = "从 C 程序员到读懂 TypeScript + Node.js + AI Agent CLI 源码"
language = "zh-CN"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
curly-quotes = false
mathjax-support = false
copy-fonts = true
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
